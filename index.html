<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK Films - Photography & Videography</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            line-height: 1.6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Thin Youtube Style Banner Header */
        header {
            position: relative;
            background-color: #000000;
            border-bottom: 2px solid #ffcc00;
            padding: 15px 10px;
            text-align: center;
            width: 100%;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #ffcc00;
            object-fit: cover;
            background-color: #333;
        }

        header h1 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 5px;
        }

        header p {
            font-size: 1.1rem;
            color: #ffcc00;
            font-weight: bold;
        }

        .contact-info {
            font-size: 0.9rem;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
            font-size: 1.8rem;
            margin: 30px 0;
            color: #ffcc00;
        }

        /* Services in one line */
        .services-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
        }

        .service-item {
            flex: 1;
            min-width: 120px;
            text-align: center;
            padding: 10px;
            background: #222;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Gallery Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .portfolio-item {
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .portfolio-item:hover {
            transform: scale(1.03);
        }

        .portfolio-item img, .portfolio-item video {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .item-desc {
            padding: 15px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: bold;
            background-color: #1a1a1a;
        }

        /* Booking Form Section */
        .booking-section {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            margin: 0 auto 40px;
            border: 1px solid #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ffcc00;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            background-color: #222;
            color: #fff;
            border-radius: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #ffcc00;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #e6b800;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #000;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <img src="http://googleusercontent.com/image_generation_content/3" alt="KK Films Logo" class="logo-img">
            <h1>KK FILMS</h1>
            <p>सुभाष यादव</p>
            <div class="contact-info">मोबाइल: +91 9648897282</div>
        </div>
    </header>

    <div class="container">

        <h2>हमारी सेवाएं</h2>
        <div class="services-container">
            <div class="service-item">सिनेमैटिक प्री-वेडिंग</div>
            <div class="service-item">वेडिंग शूट</div>
            <div class="service-item">तिलक</div>
            <div class="service-item">परीक्षा</div>
            <div class="service-item">बर्थडे पार्टी</div>
            <div class="service-item">म्यूजिक वीडियो</div>
        </div>

        <h2>हमारी गैलरी</h2>
        <div class="grid-container">
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1591604466107-ec97de577aff?q=80&w=600&auto=format&fit=crop" alt="दुल्हन की तैयारी">
                <div class="item-desc">दुल्हन की तैयारी</div>
            </div>
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1607190074257-dd4b7af0309f?q=80&w=600&auto=format&fit=crop" alt="दूल्हा">
                <div class="item-desc">दूल्हा रॉयल लुक</div>
            </div>
            <div class="portfolio-item">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=600&auto=format&fit=crop" alt="वेडिंग शूट">
                <div class="item-desc">वेडिंग शूट</div>
            </div>
            <div class="portfolio-item">
                <video controls poster="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=600&auto=format&fit=crop">
                    <source src="https://player.vimeo.com/external/435649345.sd.mp4?s=34f9a53bdcb45ff3f699042a9831d10e527a008b&profile_id=165&oauth2_token_id=57447761" type="video/mp4">
                    आपका ब्राउज़र इस वीडियो टैग का समर्थन नहीं करता है।
                </video>
                <div class="item-desc">सिनेमैटिक प्री-वेडिंग टीज़र</div>
            </div>
        </div>

        <h2>शूट बुक करें</h2>
        <div class="booking-section">
            <form action="#">
                <div class="form-group">
                    <label for="name">आपका नाम</label>
                    <input type="text" id="name" placeholder="अपना नाम लिखें" required>
                </div>
                <div class="form-group">
                    <label for="phone">मोबाइल नंबर</label>
                    <input type="tel" id="phone" placeholder="मोबाइल नंबर लिखें" required>
                </div>
                <div class="form-group">
                    <label for="date">कार्यक्रम की तारीख</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="service">इवेंट का प्रकार</label>
                    <select id="service" required>
                        <option value="" disabled selected>कृपया चुनें</option>
                        <option value="cinematic">सिनेमैटिक प्री-वेडिंग</option>
                        <option value="wedding">वेडिंग शूट</option>
                        <option value="tilak">तिलक</option>
                        <option value="pariksha">परीक्षा</option>
                        <option value="birthday">बर्थडे पार्टी</option>
                        <option value="music">म्यूजिक वीडियो</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">अभी बुक करें</button>
            </form>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 KK Films. सर्वाधिकार सुरक्षित।</p>
    </footer>

</body>
</html>
